.data-table {

.data-table th:hover { color: #3b7fc4; }
.data-table th.sorted { color: #3b7fc4; }
.sort-icon { margin-left: 4px; opacity: 0.35; font-size: 10px; }

.data-table td {

.data-table tr:last-child td { border-bottom: none; }

/* ── State ── */
const ROWS = 10;
let currentPage = 0;
let currentData = [...busData];
let currentMode = 'bus';
let sortKey = 'rate';
let sortDir = -1;
let chart;

const FONT = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';

function buildChart(monthlyRates, color) {
  const canvas = document.getElementById('myChart');
  const ctx = canvas.getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [{
        data: monthlyRates,
        backgroundColor: color + 'b0',
        borderColor: color,
        borderWidth: 1, borderRadius: 3,
        barPercentage: 0.75, categoryPercentage: 0.85
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a3a5c', titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.82)', padding: 10, cornerRadius: 6,
          callbacks: {
            title: i => months[i[0].dataIndex],
            label: i => '  Rate: ' + i.raw.toFixed(4) + ' per 1M UPT'
          },
          bodyFont:  { family: FONT, size: 11, weight: '600' },
          titleFont: { family: FONT, size: 12, weight: '700' }
        }
      },
      scales: {
        x: {
          ticks: {
            font: { family: FONT, size: 9, weight: '700' },
            color: '#4a5568',
            maxRotation: 90, minRotation: 90, autoSkip: false
          },
          grid:   { display: false },
          border: { color: '#dde4eb' }
        },
        y: {
          ticks: {
            font: { family: FONT, size: 9, weight: '700' },
            color: '#4a5568',
            maxTicksLimit: 6
          },
          grid:   { color: '#f0f3f6' },
          border: { dash: [3,3], color: 'transparent' },
          title: {
            display: true,
            text: 'Events / 1M UPT',
            font: { family: FONT, size: 10, weight: '700' },
            color: '#4a5568'
          }
        }
      }
    }
  });
}

function buildTable() {
  const total = currentData.length;
  const start = currentPage * ROWS;
  const end   = Math.min(start + ROWS, total);
  const rows  = currentData.slice(start, end);

  document.getElementById('table-body').innerHTML = rows.map(d => `
    <tr>
      <td>${d.name}</td>
      <td class="muted">${d.city}</td>
      <td>${Math.round(d.riderNum).toLocaleString()}</td>
      <td>${d.rate > 0 ? '<span class="rate-pill">' + d.rate.toFixed(4) + '</span>' : '<span class="zero">—</span>'}</td>
      <td>${d.count > 0 ? d.count.toFixed(2) : '<span class="zero">—</span>'}</td>
    </tr>`).join('');

  document.getElementById('page-info').textContent = (start+1) + '–' + end + ' of ' + total;
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = end >= total;

  ['name','city','riderNum','rate','count'].forEach(k => {
    const th = document.getElementById('th-'+k);
    const si = document.getElementById('si-'+k);
    if (!th||!si) return;
    if (k === sortKey) { th.classList.add('sorted'); si.textContent = sortDir===1?'↑':'↓'; }
    else { th.classList.remove('sorted'); si.textContent = '↕'; }
  });
}

function sortBy(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = (key==='rate'||key==='riderNum'||key==='count') ? -1 : 1; }
  currentData = [...currentData].sort((a,b) => {
    const av = a[key], bv = b[key];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (bv - av);
  });
  currentPage = 0;
  buildTable();
}

function changePage(dir) {
  const maxPage = Math.ceil(currentData.length / ROWS) - 1;
  currentPage = Math.max(0, Math.min(currentPage + dir, maxPage));
  buildTable();
}

function switchMode(mode) {
  currentMode = mode;
  const isBus = mode === 'bus';
  document.getElementById('btn-bus').classList.toggle('active', isBus);
  document.getElementById('btn-rail').classList.toggle('active', !isBus);
  document.getElementById('chart-title').textContent = isBus
    ? 'Major Passenger Assault Events — Bus Agencies'
    : 'Major Passenger Assault Events — Rail Agencies';
  document.getElementById('table-title').textContent = isBus ? 'Bus Agency Profiles' : 'Rail Agency Profiles';
  document.getElementById('dl-label').textContent = isBus ? 'Download Bus CSV' : 'Download Rail CSV';
  currentData = isBus ? [...busData] : [...railData];
  sortKey = 'rate'; sortDir = -1;
  currentPage = 0;
  buildChart(isBus ? busMonthlyRates : railMonthlyRates, isBus ? '#3b7fc4' : '#1a3a5c');
  buildTable();
}

function downloadCSV() {
  const header = 'Agency,UZA,UPT (6 MRA),Rate (6 MRA),Count (6 MRA)';
  const rows = currentData.map(d =>
    `"${d.name}","${d.city}",${Math.round(d.riderNum)},${d.rate.toFixed(4)},${d.count.toFixed(4)}`
  );
  const blob = new Blob([[header,...rows].join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (currentMode === 'bus' ? 'bus' : 'rail') + '_passenger_safety_profiles.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

switchMode('bus');
